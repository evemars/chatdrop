<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatDrop</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/app.js" defer></script>
  </head>
  <body class="app-page">
    <div class="app-shell">
      <aside class="sidebar">
        <div class="sidebar-header">
          <div>
            <div class="sidebar-badge">ChatDrop</div>
            <h1>Conversations</h1>
          </div>
          <button id="newConversationButton" class="secondary-button" type="button">
            New
          </button>
        </div>
        <div id="conversationList" class="conversation-list"></div>
      </aside>

      <main class="chat-panel">
        <header class="chat-header">
          <div>
            <div class="chat-header-label">Current Conversation</div>
            <h2 id="conversationTitle">File Transfer Assistant</h2>
          </div>
          <div class="chat-header-actions">
            <button id="refreshMessagesButton" class="ghost-button" type="button">
              Refresh
            </button>
            <button id="logoutButton" class="ghost-button" type="button">
              Sign Out
            </button>
          </div>
        </header>

        <section id="messageList" class="message-list"></section>

        <form id="composerForm" class="composer">
          <textarea
            id="messageInput"
            placeholder="Type a message, or paste an image to upload"
            rows="4"
          ></textarea>
          <div class="composer-toolbar">
            <div class="toolbar-hint">
              Press Enter for a new line. Use Command + Enter on macOS or Ctrl + Enter on Windows to send. Paste images with Ctrl/Cmd + V.
            </div>
            <div class="toolbar-actions">
              <input id="fileInput" type="file" hidden />
              <button id="uploadButton" type="button" class="secondary-button">
                Upload File
              </button>
              <button id="sendButton" type="submit" class="primary-button">
                Send
              </button>
            </div>
          </div>
        </form>

        <div id="statusBar" class="status-bar"></div>
      </main>
    </div>
  </body>
</html>
