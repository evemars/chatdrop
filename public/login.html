<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ChatDrop Login</title>
    <link rel="stylesheet" href="/static/styles.css" />
    <script src="/static/login.js" defer></script>
  </head>
  <body class="login-page">
    <main class="login-card">
      <div class="login-badge">ChatDrop</div>
      <h1>Sign in to ChatDrop</h1>
      <p>Enter the password to access local text and file transfer.</p>
      <form id="loginForm" class="login-form">
        <label class="field">
          <span>Password</span>
          <input
            id="passwordInput"
            name="password"
            type="password"
            autocomplete="current-password"
            placeholder="Enter password"
            required
          />
        </label>
        <label class="checkbox-row">
          <input id="rememberInput" name="rememberMe" type="checkbox" />
          <span>Keep me signed in (30-day rolling session)</span>
        </label>
        <button id="loginButton" type="submit" class="primary-button">
          Sign in
        </button>
        <p id="loginError" class="error-text" role="alert"></p>
      </form>
    </main>
  </body>
</html>
